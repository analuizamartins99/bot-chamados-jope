<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chamados de Manutenção — Jope ISB</title>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul: #1a56a0;
      --azul-esc: #13407a;
      --azul-claro: #e8f0fb;
      --verde: #2e7d32;
      --vermelho: #c62828;
      --amarelo: #f57f17;
      --cinza: #f0f2f5;
      --borda: #dde1e7;
      --texto: #1a1a1a;
      --texto2: #5a6475;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--cinza);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .chat-wrapper {
      width: 440px;
      max-width: 100%;
      height: 720px;
      max-height: calc(100vh - 24px);
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,.16);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--azul);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header .icon {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h2 { font-size: 14px; font-weight: 600; }
    .header p  { font-size: 11px; opacity: .8; margin-top: 1px; }

    .badge-perfil {
      margin-left: auto;
      font-size: 10px;
      background: rgba(255,255,255,.2);
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
    }

    /* ── Progresso ── */
    .progress-bar { height: 3px; background: #dde4ee; flex-shrink: 0; }
    .progress-fill { height: 100%; background: var(--azul); transition: width .35s; width: 0%; }

    /* ── Área de mensagens ── */
    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 86%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.55;
      animation: pop .2s ease;
    }
    @keyframes pop { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .bubble.bot  { background: var(--azul-claro); color: var(--texto); border-bottom-left-radius: 3px; align-self: flex-start; }
    .bubble.user { background: var(--azul); color: #fff; border-bottom-right-radius: 3px; align-self: flex-end; }
    .bubble.info { background: #fffde7; color: #5d4037; border-left: 3px solid #f9a825; max-width: 95%; font-size: 12.5px; }
    .bubble.gate { background: #fff3e0; color: #bf360c; border-left: 3px solid #e65100; max-width: 95%; font-size: 12.5px; }
    .bubble.ok   { background: #e8f5e9; color: var(--verde); border-left: 3px solid #4caf50; max-width: 95%; }
    .bubble.err  { background: #fdecea; color: var(--vermelho); border-left: 3px solid #e53935; max-width: 95%; }

    .bubble b  { font-weight: 600; }
    .bubble br { display: block; }

    /* ── Indicador digitando ── */
    .typing-dots { display: flex; gap: 4px; padding: 10px 14px; align-self: flex-start; }
    .typing-dots span {
      width: 7px; height: 7px;
      background: #b0b8c8; border-radius: 50%;
      animation: bounce .75s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(1.4)} }

    /* ── Zona de resposta ── */
    .resposta-zone { flex-shrink: 0; padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; }

    .opcoes { display: flex; flex-wrap: wrap; gap: 7px; }
    .opcoes .btn-op {
      background: #fff;
      border: 1.5px solid var(--azul);
      color: var(--azul);
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 12.5px;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .opcoes .btn-op:hover { background: var(--azul); color: #fff; }
    .opcoes .btn-op.urgente { border-color: var(--vermelho); color: var(--vermelho); }
    .opcoes .btn-op.urgente:hover { background: var(--vermelho); color: #fff; }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea#txtInput {
      flex: 1;
      border: 1.5px solid var(--borda);
      border-radius: 12px;
      padding: 9px 13px;
      font-size: 13.5px;
      font-family: inherit;
      resize: none;
      max-height: 90px;
      outline: none;
      transition: border-color .2s;
    }
    textarea#txtInput:focus { border-color: var(--azul); }
    textarea#txtInput:disabled { background: #f5f5f5; }
    .btn-send {

      border-radius: 50%;
      background: var(--azul);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    .btn-send:hover { background: var(--azul-esc); }
    .btn-send:disabled { background: #b0b8c8; cursor: default; }

      border-radius: 10px;
      padding: 12px 14px;
      text-align: center;
      cursor: pointer;
      color: var(--azul);
      font-size: 12.5px;
      transition: background .15s;

    .fotos-preview {

    }
    .fotos-preview img {
      width: 60px; height: 60px;
      object-fit: cover;
      border-radius: 7px;
      border: 1px solid var(--borda);
    }

      width: 16px; height: 16px;
      background: var(--vermelho);
      color: #fff; border-radius: 50%;
      font-size: 10px; cursor: pointer;

      display: flex;
      flex-direction: column;
      gap: 14px;

    #telaLogin p  { font-size: 12.5px; color: var(--texto2); line-height: 1.5; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--texto); }
    .field input, .field select {

      border-radius: 8px;

      outline: none;
      font-family: inherit;

    .urg-item {
      border: 2px solid var(--borda);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      font-size: 12.5px;

    .urg-item.alto:hover   { background: #fdecea; }
    .urg-item.critico:hover { background: #f3e5f5; }

    .oculto { display: none !important; }

// Palavras-chave N1 para pré-seleção por texto livre (não compulsória)
const KW_N1 = {

function normKW(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
}

function sugerirN1(texto) {
  const t = normKW(texto);
  const scores = Object.entries(KW_N1).map(([grupo, palavras]) => ({
    grupo, hits: palavras.filter(p => t.includes(normKW(p))).length
  })).filter(x => x.hits > 0).sort((a, b) => b.hits - a.hits);
  if (!scores.length) return null;
  const total = scores.reduce((s, x) => s + x.hits, 0);
  return { grupo: scores[0].grupo, confianca: Math.round(scores[0].hits / total * 100) };
}

// ─── Busca fuzzy de escolas ───────────────────────────────────────────────────
function normalizar(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9 ]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

// Distância de Levenshtein simples (para sugestões)
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) => Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function buscarEscolas(query, tipo) {
  const base = ESCOLAS_BASE[tipo] || [];
  const q = normalizar(query);
  if (!q) return { exatas: [], sugestoes: [] };

  // Exatas: contém a query como substring
  const exatas = base.filter(e => normalizar(e).includes(q));

  // Sugestões por palavras e por distância se não achar exato
  let sugestoes = [];
  if (exatas.length === 0) {
    const palavras = q.split(' ').filter(p => p.length > 2);
    sugestoes = base
      .map(e => {
        const en = normalizar(e);
        const palavraHits = palavras.filter(p => en.includes(p)).length;
        // distância sobre o trecho mais parecido (sem prefixo de tipo)
        const semPrefixo = en.replace(/^emef |^emei /, '');
        const dist = levenshtein(q.replace(/^emef |^emei /, ''), semPrefixo.slice(0, q.length + 4));
        return { nome: e, hits: palavraHits, dist };
      })
      .filter(x => x.hits > 0 || x.dist <= 4)
      .sort((a, b) => b.hits - a.hits || a.dist - b.dist)
      .slice(0, 4)
      .map(x => x.nome);
  }

  return { exatas, sugestoes };
}

function addBubble(tipo, html, delay = 0) {
  return new Promise(res => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `bubble ${tipo}`;
      div.innerHTML = html;
      msgs().appendChild(div);
      scroll();
      res();
    }, delay);
  });
}

function typing() {
  const div = document.createElement('div');
  div.className = 'typing-dots'; div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgs().appendChild(div);
  scroll();
}

function rmTyping() { const t = $('typing'); if (t) t.remove(); }

async function botFala(html, delay = 600) {
  typing();
  await new Promise(r => setTimeout(r, delay));
  rmTyping();
  await addBubble('bot', html);
}

function limparResposta() { $('respostaZone').innerHTML = ''; }

function setProgresso(pct) {
  $('progressFill').style.width = pct + '%';
}

function msgUsuario(texto) {
  addBubble('user', texto);
}

// ─── Login ───────────────────────────────────────────────────────────────────
function login() {
  const nome     = $('lNome').value.trim();
  const matricula = $('lMatricula').value.trim();
  const contato  = $('lContato').value.trim();
  const err = $('loginErr');

  if (!nome || !matricula || !contato) {
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  S.nome = nome; S.matricula = matricula; S.contato = contato;

  $('telaLogin').classList.add('oculto');
  $('telaChat').classList.remove('oculto');
  $('telaChat').style.display = 'flex';

  iniciarFluxo();
}

async function iniciarFluxo() {
  await botFala(`Olá, <b>${S.nome}</b>! 👋<br>Vou registrar seu chamado de manutenção. Primeiro, me diga: você é funcionário da escola ou técnico/equipe interna?`);

async function selecionarPerfil(p) {
  S.perfil = p;

  mostrarOpcoes(['EMEF', 'EMEI'], tipo => {
    S.tipoEscola = tipo;
    msgUsuario(tipo);
    perguntarEscolaPorBusca(cbDepois);
  });
}

async function perguntarEscolaPorBusca(cbDepois) {
  await botFala(`Qual o nome da <b>${S.tipoEscola}</b>? Digite parte do nome para buscar:`);
  limparResposta();
  const z = $('respostaZone');

  z.innerHTML = `
    <div class="input-row">
      <textarea id="txtInput" rows="1" placeholder="Ex: Monteiro, Santos, Jardim..."></textarea>
      <button class="btn-send" id="btnSend">🔍</button>
    </div>
    <div id="resultadosBusca" style="margin-top:6px; display:flex; flex-direction:column; gap:5px;"></div>`;

  const ta = $('txtInput');
  const res = $('resultadosBusca');

  function renderResultados(query) {
    res.innerHTML = '';
    if (query.length < 2) return;

    const { exatas, sugestoes } = buscarEscolas(query, S.tipoEscola);

    if (exatas.length > 0) {
      exatas.forEach(nome => {
        const btn = document.createElement('button');
        btn.className = 'btn-op';
        btn.style.cssText = 'text-align:left; width:100%; border-radius:8px;';
        btn.textContent = nome;
        btn.onclick = () => confirmarEscola(nome, cbDepois);
        res.appendChild(btn);
      });
    } else if (sugestoes.length > 0) {
      const aviso = document.createElement('div');
      aviso.style.cssText = 'font-size:12px; color:var(--texto2); padding:4px 2px;';
      aviso.textContent = 'Não encontrei exato. Você quis dizer:';
      res.appendChild(aviso);
      sugestoes.forEach(nome => {
        const btn = document.createElement('button');
        btn.className = 'btn-op';
        btn.style.cssText = 'text-align:left; width:100%; border-radius:8px;';
        btn.textContent = nome;
        btn.onclick = () => confirmarEscola(nome, cbDepois);
        res.appendChild(btn);
      });
    } else {
      const aviso = document.createElement('div');
      aviso.className = 'bubble err';
      aviso.style.cssText = 'font-size:12px; max-width:100%; margin:0;';
      aviso.innerHTML = `Nenhuma ${S.tipoEscola} encontrada com "<b>${query}</b>".<br>Tente outra parte do nome.`;
      res.appendChild(aviso);
    }
  }

  // Busca ao digitar (debounce 300ms)
  let timer;
  ta.oninput = () => {
    clearTimeout(timer);
    timer = setTimeout(() => renderResultados(ta.value.trim()), 300);
  };

  // Busca ao clicar
  $('btnSend').onclick = () => renderResultados(ta.value.trim());
  ta.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); renderResultados(ta.value.trim()); } };
  setTimeout(() => ta.focus(), 100);
}

function confirmarEscola(nome, cbDepois) {
  S.escola = nome;
  msgUsuario(nome);
  limparResposta();
  cbDepois();
}

function mostrarInputComN1() {
  limparResposta();
  const z = $('respostaZone');
  z.innerHTML = `
    <div class="input-row">
      <textarea id="txtInput" rows="1" placeholder="Descreva o problema (opcional)..."></textarea>
      <button class="btn-send" id="btnSend">🔍</button>
    </div>
    <div id="sugestaoN1" style="margin:4px 0 2px; min-height:20px;"></div>

    <div class="opcoes" id="botoesN1"></div>`;

  // Botões N1 fixos
  const botoesN1 = $('botoesN1');
  N1_GRUPOS.forEach(grupo => {
    const btn = document.createElement('button');
    btn.className = 'btn-op';
    btn.id = `n1_${grupo}`;
    const icones = {
      'Água / Vazamento / Hidráulico':  '💧',
      'Não funciona / Elétrico':        '⚡',
      'Quebrado / Solto / Danificado':  '🔨',
      'Pragas / Infestação':            '🐀',
    };
    btn.textContent = `${icones[grupo] || ''} ${grupo}`;
    btn.onclick = () => selecionarN1(grupo);
    botoesN1.appendChild(btn);
  });

  // Pré-seleção por texto (debounce)
  const ta = $('txtInput');
  let timer;
  ta.oninput = () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      const sugestao = sugerirN1(ta.value);
      const divSug = $('sugestaoN1');
      divSug.innerHTML = '';
      if (sugestao && sugestao.confianca >= 40) {
        divSug.innerHTML =
          `<div class="class-card" style="padding:7px 12px; margin-bottom:4px;">` +
          `💡 Parece ser <b>${sugestao.grupo}</b> (${sugestao.confianca}% de confiança) — ` +
          `<span style="color:var(--azul); cursor:pointer; text-decoration:underline;" ` +
          `onclick="selecionarN1('${sugestao.grupo.replace(/'/g, "\\'")}')">confirmar</span> ou escolha abaixo.` +
          `</div>`;
      }
    }, 350);
  };

  // Enter no textarea busca sugestão
  ta.onkeydown = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ta.dispatchEvent(new Event('input')); }
  };

  // Botão lupa força sugestão
  $('btnSend').onclick = () => ta.dispatchEvent(new Event('input'));

  setTimeout(() => ta.focus(), 100);
}

// ─── Envio ────────────────────────────────────────────────────────────────────
async function enviarChamado() {
  limparResposta();
  msgUsuario('✅ Enviar chamado');
  typing();
  setProgresso(97);

  const form = new FormData();
  form.append('perfil', S.perfil);
  form.append('solicitanteNome', S.nome);
  form.append('matricula', S.matricula);
  form.append('contato', S.contato);
  form.append('escola', S.escola);
  form.append('local', S.local);
  form.append('andar', S.andar || '');
  form.append('tipoOS', S.tipoOS);
  form.append('equipe', S.equipe || '');
  form.append('urgencia', S.urgencia);
  form.append('descricao', S.descricao);
  form.append('equipamento', S.equipamento || '');
  form.append('numPatrimonio', S.numPatrimonio || '');
  form.append('osOrigem', S.osOrigem || '');
  form.append('materiais', S.materiais || '');
  S.fotos.forEach(f => form.append('fotos', f));

  try {
    const resp = await fetch('/chamado', { method: 'POST', body: form });
    const data = await resp.json();
    rmTyping();

    if (data.sucesso) {
      setProgresso(100);
      await addBubble('ok',
        `✅ <b>Chamado registrado com sucesso!</b><br><br>` +
        `📌 <b>Número:</b> ${data.id}<br>` +
        `A equipe responsável será acionada em breve.`
      );

      // Botão novo chamado
      const z = $('respostaZone');
      z.innerHTML = `
        <div class="opcoes">
          <button class="btn-op" onclick="location.reload()">+ Novo chamado</button>
        </div>`;
    } else {
      await addBubble('err', `❌ Erro: ${data.erro}`);
      mostrarOpcoes(['🔄 Tentar novamente'], () => enviarChamado());
    }
  } catch {
    rmTyping();
    await addBubble('err', '❌ Falha na conexão. Verifique sua internet e tente novamente.');
    mostrarOpcoes(['🔄 Tentar novamente'], () => enviarChamado());
  }
}

// ─── Helpers de UI ────────────────────────────────────────────────────────────
function mostrarOpcoes(lista, cb) {
  limparResposta();
  const z = $('respostaZone');
  const div = document.createElement('div');
  div.className = 'opcoes';
  lista.forEach(op => {
    const btn = document.createElement('button');
    btn.className = 'btn-op';
    btn.textContent = op;
    btn.onclick = () => { limparResposta(); cb(op); };
    div.appendChild(btn);
  });
  z.appendChild(div);
}

function mostrarInputTexto(cb) {
  limparResposta();
  const z = $('respostaZone');
  z.innerHTML = `
    <div class="input-row">
      <textarea id="txtInput" rows="2" placeholder="Digite aqui..."></textarea>
      <button class="btn-send" id="btnSend">➤</button>
    </div>`;
  const ta = $('txtInput');
  const btn = $('btnSend');
  const send = () => {
    const v = ta.value.trim();
    if (!v) return;
    limparResposta();
    cb(v);
  };
  btn.onclick = send;
  ta.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
  setTimeout(() => ta.focus(), 100);
}

function mostrarInputOpcional(cbTexto, cbPular) {
  limparResposta();
  const z = $('respostaZone');
  z.innerHTML = `
    <div class="input-row">
      <textarea id="txtInput" rows="2" placeholder="Digite ou pule esta etapa..."></textarea>
      <button class="btn-send" id="btnSend">➤</button>
    </div>
    <div class="opcoes">
      <button class="btn-op" id="btnPular">Pular ›</button>
    </div>`;
  const ta = $('txtInput');
  const btn = $('btnSend');
  const send = () => {
    const v = ta.value.trim();
    limparResposta();
    if (v) cbTexto(v); else cbPular();
  };
  btn.onclick = send;
  $('btnPular').onclick = () => { limparResposta(); cbPular(); };
  ta.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
  setTimeout(() => ta.focus(), 100);
}

function mostrarUrgencia(opcoes, cb) {
  limparResposta();
  const z = $('respostaZone');
  const info = {
    Baixo:   { icon: '🟢', desc: 'Pode aguardar',         cls: 'baixo' },
    Médio:   { icon: '🟡', desc: 'Urgente, não crítico',  cls: 'medio' },
    Alto:    { icon: '🔴', desc: 'Risco de impacto alto', cls: 'alto' },
    Crítico: { icon: '🟣', desc: 'Risco imediato à segurança', cls: 'critico' },
  };
  const grid = document.createElement('div');
  grid.className = 'urg-grid';
  opcoes.forEach(op => {
    const d = info[op];
    const btn = document.createElement('div');
    btn.className = `urg-item ${d.cls}`;
    btn.innerHTML = `<span class="urg-icon">${d.icon}</span><b>${op}</b><br><small>${d.desc}</small>`;
    btn.onclick = () => { limparResposta(); cb(op); };
    grid.appendChild(btn);
  });
  z.appendChild(grid);
}

function mostrarUpload(cbContinuar) {
  limparResposta();
  const z = $('respostaZone');
  z.innerHTML = `
    <label class="upload-zone" for="fotoInput">
      📷 Toque para adicionar fotos (máx. ${S.fotosMax})
    </label>
    <input type="file" id="fotoInput" accept="image/jpeg,image/png" multiple />
    <div class="fotos-preview" id="fotosPreview"></div>
    <div class="opcoes" style="margin-top:6px">
      <button class="btn-op" id="btnEnviarFotos">Continuar →</button>
      <button class="btn-op" id="btnSemFoto">Sem foto</button>
    </div>`;

  $('fotoInput').onchange = e => adicionarFotos(e.target.files);
  $('btnEnviarFotos').onclick = () => {
    if (S.fotos.length > 0) msgUsuario(`📷 ${S.fotos.length} foto(s) anexada(s)`);
    limparResposta();
    cbContinuar();
  };
  $('btnSemFoto').onclick = () => {
    msgUsuario('Sem foto');
    S.fotos = [];
    limparResposta();
    cbContinuar();
  };
}

function adicionarFotos(files) {
  const preview = $('fotosPreview');
  Array.from(files).forEach(f => {
    if (S.fotos.length >= S.fotosMax) return;
    if (!['image/jpeg', 'image/png'].includes(f.type)) return;
    if (f.size > 5 * 1024 * 1024) { alert(`${f.name} excede 5 MB.`); return; }
    S.fotos.push(f);

    const wrap = document.createElement('div');
    wrap.className = 'foto-thumb';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    const rm = document.createElement('div');
    rm.className = 'rm-foto';
    rm.textContent = '×';
    const idx = S.fotos.length - 1;
    rm.onclick = () => { S.fotos.splice(idx, 1); wrap.remove(); };
    wrap.appendChild(img);
    wrap.appendChild(rm);
    preview.appendChild(wrap);
  });
}

function reiniciarFluxo() {
  msgUsuario('✏️ Corrigir informações');
  // Reinicia apenas o fluxo, mantendo login
  S.tipoEscola = ''; S.escola = ''; S.local = ''; S.andar = '';
  S.tipoOS = ''; S.equipe = ''; S.gate = false; S.urgencia = '';
  S.descricao = ''; S.equipamento = ''; S.numPatrimonio = ''; S.osOrigem = ''; S.materiais = '';
  S.fotos = [];
  setProgresso(10);
  if (S.perfil === 'funcionario') iniciarTrackFuncionario();
  else iniciarTrackTecnico();
}
</script>
